<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: url("{{ url_for('static', filename='images/college.jpeg') }}") no-repeat center center/cover;
        }

        .overlay {
            background: rgba(0,0,0,0.6);
            min-height: 100vh;
            padding: 24px 16px;
        }

        .card {
            width: min(350px, 100%);
            padding: 25px;
            border-radius: 15px;
            background: rgba(255,255,255,0.9);
        }

        .logo {
            width: 100px;
        }

        @media (max-width: 576px) {
            .card {
                padding: 24px 20px;
                border-radius: 24px;
            }

            .logo {
                width: 84px;
            }
        }
    </style>
    {% include "_pwa_head.html" %}
</head>

<body>
{% include "_pwa_banner.html" %}

<div class="overlay d-flex justify-content-center align-items-center">

    <div class="card text-center shadow">

        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo mb-3">

        <h3>Login</h3>
        <p class="text-muted">Timetable System</p>

        <form action="/login" method="POST">

            <select name="department" class="form-select mb-3" required>
                <option value="" disabled selected>Select Department</option>
                <option value="ENTC">ENTC</option>
                <option value="CS">Computer Science</option>
                <option value="IT">Information Technology</option>
                <option value="CIVIL">Civil Engineering</option>
                <option value="MECHANICAL">Mechanical Engineering</option>
            </select>

            <input name="username" class="form-control mb-3" placeholder="Username" required>

            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

            <button class="btn btn-dark w-100">Login</button>

        </form>

    </div>

</div>

<script src="{{ url_for('static', filename='js/pwa.js') }}" defer></script>

</body>
</html>
